version: "3.9"

services:
  web:
    image: ${DOCKERHUB_USERNAME}/login-whitelabel:${APP_VERSION}
    container_name: login-whitelabel-prod
    expose:
      - "3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - shared-network
    restart: unless-stopped   

networks:
  shared-network:
    external: true